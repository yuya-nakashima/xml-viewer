<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XML Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>XML Viewer</h1>
    <p class="description">
      XMLファイルを読み込み、整形して表示するシンプルなビューアです。
    </p>

    <section id="dropZone" class="drop-zone" aria-label="XMLファイルのアップロードエリア">
      <p class="drop-zone__title">ここにXMLファイルをドラッグ＆ドロップ</p>
      <p class="drop-zone__sub">または下のボタンから選択してください</p>

      <div class="upload-box">
        <label for="xmlFile" class="file-label">XMLファイルを選択</label>
        <input type="file" id="xmlFile" accept=".xml,text/xml,application/xml" />
        <button id="clearButton" type="button">クリア</button>
      </div>
    </section>

    <section class="status-area">
      <p id="fileName" class="file-name"></p>
      <p id="message" class="message"></p>
    </section>

    <section class="viewer-section">
      <div class="viewer-header">
        <h2>表示結果</h2>
        <button id="copyButton" type="button">コピー</button>
      </div>
      <pre id="output" class="output">ここにXMLが表示されます。</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
