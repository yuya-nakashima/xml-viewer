<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XMLビューア</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>XMLビューア</h1>
    </header>

    <section class="control-section">
      <label for="folderInput" class="folder-button">フォルダ選択</label>
      <input
        type="file"
        id="folderInput"
        webkitdirectory
        multiple
      />
      <p id="message" class="message"></p>
    </section>

    <section id="tabSection" class="tab-section is-hidden">
      <div id="tabs" class="tabs" aria-label="XMLタブ一覧"></div>
    </section>

    <section class="viewer-section">
      <h2 class="viewer-title">表示結果</h2>
      <div id="viewerBody" class="viewer-body">ここに変換結果</div>
    </section>
  </main>

  <input
    type="file"
    id="singleXslInput"
    accept=".xsl,.xslt,.xml,text/xml,application/xml"
    hidden
  />

  <script src="script.js"></script>
</body>
</html>
